<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved Student Profile Card</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .profile-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            width: 300px;
            text-align: center;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
            color: white;
        }
        .profile-card:hover {
            transform: translateY(-5px);
        }
        .profile-img {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.3);
            /* Added object-fit to ensure the face is centered and scaled properly */
            object-fit: cover;
            display: block;
        }
        h1 {
            margin: 10px 0;
            font-size: 1.5rem;
            color: white;
        }
        h3 {
            margin: 0 0 15px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
            font-size: 1.1rem;
        }
        p {
            line-height: 1.5;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <!-- Replaced div placeholder with a real image -->
        <img src="https://i.pravatar.cc/150?u=jane" alt="Jane Doe" class="profile-img">
        <h1>Jane Doe</h1>
        <h3>Computer Science</h3>
        <p>Passionate about web development and artificial intelligence. Always learning new technologies and exploring innovative solutions.</p>
    </div>
</body>
</html>
